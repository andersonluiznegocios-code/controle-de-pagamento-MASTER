let registros = [];
let editandoId = null;
let confirmarExclusaoId = null;
let visao = 'registros';
let clienteExpandido = null;
let ordenacao = { campo: 'dataVencimento', dir: 'desc' };

// ---------- Mapeamento de campos (front camelCase <-> banco snake_case) ----------
function paraLinhaBanco(r) {
  return {
    id: r.id,
    nome_cliente: r.nomeCliente || '',
    cpf: r.cpf || '',
    valor_quitacao: r.valorQuitacao === '' || r.valorQuitacao == null ? null : parseFloat(r.valorQuitacao),
    origem_pagamento: r.origemPagamento || 'fatura',
    seguro_premiado_pago: !!r.seguroPremiadoPago,
    valor_seguro_premiado: r.valorSeguroPremiado === '' || r.valorSeguroPremiado == null ? null : parseFloat(r.valorSeguroPremiado),
    data_vencimento: r.dataVencimento || null,
    data_pagamento: r.dataPagamento || null,
    id_proposta: r.idProposta || '',
    codigo_barras: r.codigoBarras || '',
    iof_encargos: r.iofEncargos === '' || r.iofEncargos == null ? null : parseFloat(r.iofEncargos),
    valor_boleto: r.valorBoleto === '' || r.valorBoleto == null ? null : parseFloat(r.valorBoleto),
    qtd_boletos_pagos: r.qtdBoletosPagos === '' || r.qtdBoletosPagos == null ? null : parseInt(r.qtdBoletosPagos, 10),
    anexo_url: r.anexoUrl || null,
    anexo_nome: r.anexoNome || null
  };
}

function deLinhaBanco(row) {
  return {
    id: row.id,
    nomeCliente: row.nome_cliente || '',
    cpf: row.cpf || '',
    valorQuitacao: row.valor_quitacao != null ? String(row.valor_quitacao) : '',
    origemPagamento: row.origem_pagamento || 'fatura',
    seguroPremiadoPago: !!row.seguro_premiado_pago,
    valorSeguroPremiado: row.valor_seguro_premiado != null ? String(row.valor_seguro_premiado) : '',
    dataVencimento: row.data_vencimento || '',
    dataPagamento: row.data_pagamento || '',
    idProposta: row.id_proposta || '',
    codigoBarras: row.codigo_barras || '',
    iofEncargos: row.iof_encargos != null ? String(row.iof_encargos) : '',
    valorBoleto: row.valor_boleto != null ? String(row.valor_boleto) : '',
    qtdBoletosPagos: row.qtd_boletos_pagos != null ? String(row.qtd_boletos_pagos) : '',
    anexoUrl: row.anexo_url || '',
    anexoNome: row.anexo_nome || ''
  };
}

// ---------- Persistência (Supabase REST API) ----------
async function supaFetch(path, options = {}) {
  const url = SUPABASE_URL + '/rest/v1/' + path;
  const headers = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(options.headers || {})
  };
  const resp = await fetch(url, { ...options, headers });
  if (!resp.ok) {
    let detalhe = '';
    try { const body = await resp.json(); detalhe = body.message || JSON.stringify(body); } catch (e) {}
    throw new Error('Erro ' + resp.status + (detalhe ? ': ' + detalhe : ''));
  }
  if (resp.status === 204) return null;
  const text = await resp.text();
  return text ? JSON.parse(text) : null;
}

async function carregarRegistros() {
  try {
    const linhas = await supaFetch(TABLE + '?select=*&order=created_at.desc', { method: 'GET' });
    registros = (linhas || []).map(deLinhaBanco);
    limparAlerta();
  } catch (e) {
    registros = [];
    mostrarAlerta('Não foi possível carregar os dados da nuvem. Detalhe: ' + e.message);
  }
}

async function inserirRegistro(registro) {
  const linha = paraLinhaBanco(registro);
  await supaFetch(TABLE, {
    method: 'POST',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify(linha)
  });
}

async function atualizarRegistro(registro) {
  const linha = paraLinhaBanco(registro);
  await supaFetch(TABLE + '?id=eq.' + encodeURIComponent(registro.id), {
    method: 'PATCH',
    headers: { 'Prefer': 'return=minimal' },
    body: JSON.stringify(linha)
  });
}

async function excluirRegistroRemoto(id) {
  await supaFetch(TABLE + '?id=eq.' + encodeURIComponent(id), {
    method: 'DELETE',
    headers: { 'Prefer': 'return=minimal' }
  });
}

const BUCKET = 'boletos';

function sanitizarNomeArquivo(nome) {
  return nome
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-zA-Z0-9.\-_]/g, '_');
}

async function uploadAnexo(file, registroId) {
  const nomeSeguro = sanitizarNomeArquivo(file.name);
  const caminho = registroId + '/' + Date.now() + '_' + nomeSeguro;
  const url = SUPABASE_URL + '/storage/v1/object/' + BUCKET + '/' + caminho;

  const resp = await fetch(url, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': file.type || 'application/octet-stream'
    },
    body: file
  });

  if (!resp.ok) {
    let detalhe = '';
    try { const body = await resp.json(); detalhe = body.message || JSON.stringify(body); } catch (e) {}
    throw new Error('Falha no upload (' + resp.status + ')' + (detalhe ? ': ' + detalhe : ''));
  }

  const publicUrl = SUPABASE_URL + '/storage/v1/object/public/' + BUCKET + '/' + caminho;
  return { url: publicUrl, nome: file.name };
}

function mostrarAlerta(msg) {
  document.getElementById('alertBox').innerHTML = `<div class="alert">${escapeHtml(msg)}</div>`;

function limparAlerta() {
  document.getElementById('alertBox').innerHTML = '';
}

// ---------- Utils ----------
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

function formatarCPF(valor) {
  const nums = (valor || '').replace(/\D/g, '').slice(0, 11);
  let f = nums;
  if (nums.length > 9) f = nums.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
  else if (nums.length > 6) f = nums.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  else if (nums.length > 3) f = nums.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  return f;
}

function formatarMoeda(valor) {
  const num = parseFloat(valor);
  if (isNaN(num)) return 'R$ 0,00';
  return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatarData(iso) {
  if (!iso) return '—';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function gerarId() {
  return 'reg_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

// ---------- Form helpers ----------
const formVazio = () => ({
  nomeCliente: '', cpf: '', valorQuitacao: '', origemPagamento: 'fatura',
  seguroPremiadoPago: false, valorSeguroPremiado: '',
  dataVencimento: '', dataPagamento: '', idProposta: '', codigoBarras: '', iofEncargos: '',
  valorBoleto: '', qtdBoletosPagos: '', anexoUrl: '', anexoNome: ''
});

function pagamentoEmAtraso() {
  const venc = document.getElementById('f_dataVencimento').value;
  const pag = document.getElementById('f_dataPagamento').value;
  if (!venc || !pag) return false;
  return pag > venc;
}

function atualizarCampoIofEncargos() {
  const campo = document.getElementById('campoIofEncargos');
  campo.style.display = pagamentoEmAtraso() ? 'block' : 'none';
}

function atualizarStatusAnexo(registro) {
  const status = document.getElementById('anexoStatus');
  if (registro && registro.anexoUrl) {
    status.innerHTML = 'Arquivo atual: <a href="' + registro.anexoUrl + '" target="_blank" style="color:#1d6fc4;">' + escapeHtml(registro.anexoNome || 'ver anexo') + '</a> — selecionar um novo arquivo abaixo substitui este.';
  } else {
    status.textContent = '';
  }
}

function preencherForm(registro) {
  document.getElementById('f_nomeCliente').value = registro.nomeCliente || '';
  document.getElementById('f_cpf').value = registro.cpf || '';
  document.getElementById('f_valorQuitacao').value = registro.valorQuitacao || '';
  document.getElementById('f_origemPagamento').value = registro.origemPagamento || 'fatura';
  document.getElementById('f_seguroPremiadoPago').checked = !!registro.seguroPremiadoPago;
  document.getElementById('f_valorSeguroPremiado').value = registro.valorSeguroPremiado || '';
  document.getElementById('f_dataVencimento').value = registro.dataVencimento || '';
  document.getElementById('f_dataPagamento').value = registro.dataPagamento || '';
  document.getElementById('f_idProposta').value = registro.idProposta || '';
  document.getElementById('f_codigoBarras').value = registro.codigoBarras || '';
  document.getElementById('f_iofEncargos').value = registro.iofEncargos || '';
  document.getElementById('f_valorBoleto').value = registro.valorBoleto || '';
  document.getElementById('f_qtdBoletosPagos').value = registro.qtdBoletosPagos || '';
  document.getElementById('f_anexoArquivo').value = '';
  document.getElementById('campoValorSeguro').style.display = registro.seguroPremiadoPago ? 'block' : 'none';
  atualizarCampoIofEncargos();
  atualizarStatusAnexo(registro);
}

function lerForm() {
  return {
    nomeCliente: document.getElementById('f_nomeCliente').value.trim(),
    cpf: document.getElementById('f_cpf').value.trim(),
    valorQuitacao: document.getElementById('f_valorQuitacao').value,
    origemPagamento: document.getElementById('f_origemPagamento').value,
    seguroPremiadoPago: document.getElementById('f_seguroPremiadoPago').checked,
    valorSeguroPremiado: document.getElementById('f_valorSeguroPremiado').value,
    dataVencimento: document.getElementById('f_dataVencimento').value,
    dataPagamento: document.getElementById('f_dataPagamento').value,
    idProposta: document.getElementById('f_idProposta').value.trim(),
    codigoBarras: document.getElementById('f_codigoBarras').value.trim(),
    iofEncargos: document.getElementById('f_iofEncargos').value,
    valorBoleto: document.getElementById('f_valorBoleto').value,
    qtdBoletosPagos: document.getElementById('f_qtdBoletosPagos').value
  };
}

// ---------- Modal ----------
function abrirNovo() {
  editandoId = null;
  preencherForm(formVazio());
  document.getElementById('modalTitulo').textContent = 'Novo registro';
  document.getElementById('btnSalvarModal').textContent = 'Cadastrar';
  document.getElementById('modalForm').classList.add('show');
}

function abrirEdicao(id) {
  const registro = registros.find(r => r.id === id);
  if (!registro) return;
  editandoId = id;
  preencherForm(registro);
  document.getElementById('modalTitulo').textContent = 'Editar registro';
  document.getElementById('btnSalvarModal').textContent = 'Salvar alterações';
  document.getElementById('modalForm').classList.add('show');
}

function fecharModal() {
  document.getElementById('modalForm').classList.remove('show');
}

document.getElementById('btnNovo').addEventListener('click', abrirNovo);
document.getElementById('btnCancelarModal').addEventListener('click', fecharModal);
document.getElementById('modalForm').addEventListener('click', (e) => {
  if (e.target.id === 'modalForm') fecharModal();
});

document.getElementById('f_seguroPremiadoPago').addEventListener('change', (e) => {
  document.getElementById('campoValorSeguro').style.display = e.target.checked ? 'block' : 'none';
});

document.getElementById('f_dataVencimento').addEventListener('change', atualizarCampoIofEncargos);
document.getElementById('f_dataPagamento').addEventListener('change', atualizarCampoIofEncargos);

document.getElementById('f_cpf').addEventListener('input', (e) => {
  e.target.value = formatarCPF(e.target.value);
});

document.getElementById('formRegistro').addEventListener('submit', async (e) => {
  e.preventDefault();
  const dados = lerForm();

  if (!dados.nomeCliente || !dados.cpf || !dados.idProposta) {
    mostrarAlerta('Preencha nome, CPF e ID da proposta.');
    return;
  }

  if (dados.dataPagamento && dados.dataVencimento && dados.dataPagamento > dados.dataVencimento) {
    if (dados.iofEncargos === '' || dados.iofEncargos == null || isNaN(parseFloat(dados.iofEncargos))) {
      mostrarAlerta('O pagamento foi feito após o vencimento. Preencha o valor de IOF/Encargos para salvar o registro.');
      return;
    }
  }

  const btnSalvar = document.getElementById('btnSalvarModal');
  const textoOriginal = btnSalvar.textContent;
  btnSalvar.textContent = 'Salvando...';
  btnSalvar.disabled = true;

  try {
    const idDoRegistro = editandoId || gerarId();

    // upload do anexo, se um novo arquivo foi selecionado
    const arquivoInput = document.getElementById('f_anexoArquivo');
    const arquivoSelecionado = arquivoInput.files && arquivoInput.files[0];
    let anexoUrl = '';
    let anexoNome = '';

    if (arquivoSelecionado) {
      btnSalvar.textContent = 'Enviando anexo...';
      const resultado = await uploadAnexo(arquivoSelecionado, idDoRegistro);
      anexoUrl = resultado.url;
      anexoNome = resultado.nome;
      btnSalvar.textContent = 'Salvando...';
    } else if (editandoId) {
      // mantem o anexo existente se nao foi selecionado um novo arquivo
      const registroAtual = registros.find(r => r.id === editandoId);
      anexoUrl = (registroAtual && registroAtual.anexoUrl) || '';
      anexoNome = (registroAtual && registroAtual.anexoNome) || '';
    }

    const dadosComAnexo = { ...dados, anexoUrl, anexoNome };

    if (editandoId) {
      const registroAtualizado = { ...dadosComAnexo, id: editandoId };
      await atualizarRegistro(registroAtualizado);
      const idx = registros.findIndex(r => r.id === editandoId);
      if (idx !== -1) registros[idx] = registroAtualizado;
    } else {
      const novoRegistro = { ...dadosComAnexo, id: idDoRegistro };
      await inserirRegistro(novoRegistro);
      registros.unshift(novoRegistro);
    }
    limparAlerta();
    fecharModal();
    render();
  } catch (err) {
    mostrarAlerta('Não foi possível salvar na nuvem agora. Detalhe: ' + err.message);
  } finally {
    btnSalvar.textContent = textoOriginal;
    btnSalvar.disabled = false;
  }
});

// ---------- Exclusão ----------
function pedirExclusao(id) {
  confirmarExclusaoId = id;
  document.getElementById('modalExcluir').classList.add('show');
}

document.getElementById('btnCancelarExcluir').addEventListener('click', () => {
  confirmarExclusaoId = null;
  document.getElementById('modalExcluir').classList.remove('show');
});

document.getElementById('btnConfirmarExcluir').addEventListener('click', async () => {
  const idParaExcluir = confirmarExclusaoId;
  confirmarExclusaoId = null;
  document.getElementById('modalExcluir').classList.remove('show');

  if (!idParaExcluir) return;
  try {
    await excluirRegistroRemoto(idParaExcluir);
    registros = registros.filter(r => r.id !== idParaExcluir);
    limparAlerta();
    render();
  } catch (err) {
    mostrarAlerta('Não foi possível excluir na nuvem agora. Detalhe: ' + err.message);
  }
});

document.getElementById('modalExcluir').addEventListener('click', (e) => {
  if (e.target.id === 'modalExcluir') {
    confirmarExclusaoId = null;
    e.currentTarget.classList.remove('show');
  }
});

// ---------- Filtros / busca / ordenação ----------
document.getElementById('busca').addEventListener('input', render);
document.getElementById('filtroOrigem').addEventListener('change', render);
document.getElementById('filtroSeguro').addEventListener('change', render);

document.getElementById('btnVisaoRegistros').addEventListener('click', () => {
  visao = 'registros';
  document.getElementById('btnVisaoRegistros').classList.add('active');
  document.getElementById('btnVisaoClientes').classList.remove('active');
  render();
});
document.getElementById('btnVisaoClientes').addEventListener('click', () => {
  visao = 'clientes';
  document.getElementById('btnVisaoClientes').classList.add('active');
  document.getElementById('btnVisaoRegistros').classList.remove('active');
  render();
});

function toggleOrdenacao(campo) {
  if (ordenacao.campo === campo) {
    ordenacao.dir = ordenacao.dir === 'asc' ? 'desc' : 'asc';
  } else {
    ordenacao = { campo, dir: 'asc' };
  }
  render();
}

function getFiltrados() {
  let lista = [...registros];
  const termo = document.getElementById('busca').value.trim().toLowerCase();
  const filtroOrigem = document.getElementById('filtroOrigem').value;
  const filtroSeguro = document.getElementById('filtroSeguro').value;

  if (termo) {
    lista = lista.filter(r =>
      (r.nomeCliente || '').toLowerCase().includes(termo) ||
      (r.cpf || '').includes(termo) ||
      (r.idProposta || '').toLowerCase().includes(termo) ||
      (r.codigoBarras || '').toLowerCase().includes(termo)
    );
  }
  if (filtroOrigem !== 'todos') {
    lista = lista.filter(r => r.origemPagamento === filtroOrigem);
  }
  if (filtroSeguro !== 'todos') {
    lista = lista.filter(r => filtroSeguro === 'sim' ? r.seguroPremiadoPago : !r.seguroPremiadoPago);
  }

  lista.sort((a, b) => {
    let va = a[ordenacao.campo], vb = b[ordenacao.campo];
    if (ordenacao.campo === 'valorQuitacao' || ordenacao.campo === 'valorSeguroPremiado') {
      va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
    } else {
      va = (va || '').toString().toLowerCase(); vb = (vb || '').toString().toLowerCase();
    }
    if (va < vb) return ordenacao.dir === 'asc' ? -1 : 1;
    if (va > vb) return ordenacao.dir === 'asc' ? 1 : -1;
    return 0;
  });

  return lista;
}

// ---------- Exportar CSV ----------
document.getElementById('btnExportar').addEventListener('click', () => {
  const lista = getFiltrados();
  const headers = ['Nome do Cliente','CPF','Valor de Quitação','Origem do Pagamento','Valor do Boleto','Quantidade de Boletos Pagos','Seguro Premiado Pago','Valor Seguro Premiado','Data de Vencimento','Data de Pagamento','IOF/Encargos (atraso)','ID da Proposta','Código de Barras','Link do Anexo'];
  const linhas = lista.map(r => [
    r.nomeCliente,
    r.cpf,
    (parseFloat(r.valorQuitacao) || 0).toFixed(2).replace('.', ','),
    r.origemPagamento === 'fatura' ? 'Fatura' : 'DDA',
    r.valorBoleto ? (parseFloat(r.valorBoleto) || 0).toFixed(2).replace('.', ',') : '',
    r.qtdBoletosPagos || '',
    r.seguroPremiadoPago ? 'Sim' : 'Não',
    r.seguroPremiadoPago ? (parseFloat(r.valorSeguroPremiado) || 0).toFixed(2).replace('.', ',') : '',
    formatarData(r.dataVencimento),
    r.dataPagamento ? formatarData(r.dataPagamento) : '',
    r.iofEncargos ? (parseFloat(r.iofEncargos) || 0).toFixed(2).replace('.', ',') : '',
    r.idProposta,
    r.codigoBarras || '',
    r.anexoUrl || ''
  ]);
  const csv = [headers, ...linhas].map(linha => linha.map(c => `"${String(c).replace(/"/g, '""')}"`).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `controle_pagamentos_${new Date().toISOString().split('T')[0]}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ---------- Render ----------
function setaOrdenacao(campo) {
  if (ordenacao.campo !== campo) return '<span style="opacity:0.25">↕</span>';
  return ordenacao.dir === 'asc' ? '↑' : '↓';
}

function renderCards(lista) {
  const totalQuitacao = lista.reduce((acc, r) => acc + (parseFloat(r.valorQuitacao) || 0), 0);
  const totalSeguro = lista.reduce((acc, r) => acc + (r.seguroPremiadoPago ? (parseFloat(r.valorSeguroPremiado) || 0) : 0), 0);
  const pagos = lista.filter(r => r.dataPagamento).length;
  const pendentes = lista.length - pagos;

  const cards = [
    { label: 'Registros', valor: lista.length },
    { label: 'Pagos', valor: pagos, cor: '#5fb88a' },
    { label: 'Pendentes', valor: pendentes, cor: '#a16207' },
    { label: 'Total quitação', valor: formatarMoeda(totalQuitacao), money: true },
    { label: 'Total seguro premiado', valor: formatarMoeda(totalSeguro), money: true }
  ];

  document.getElementById('cards').innerHTML = cards.map(c => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value mono ${c.money ? 'money' : ''}" style="${c.cor ? `color:${c.cor}` : ''}">${c.valor}</div>
    </div>
  `).join('');
}

function renderTabelaRegistros(lista) {
  if (lista.length === 0) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty-state">${registros.length === 0 ? 'Nenhum registro cadastrado ainda. Clique em "Novo registro" para começar.' : 'Nenhum registro encontrado com os filtros atuais.'}</div>`;
    return;
  }

  const colunas = [
    ['nomeCliente', 'Cliente'], ['cpf', 'CPF'], ['valorQuitacao', 'Valor quitação'],
    ['origemPagamento', 'Origem'], ['valorBoleto', 'Valor boleto'], ['qtdBoletosPagos', 'Qtd. pagos'],
    ['seguroPremiadoPago', 'Seguro premiado'],
    ['dataVencimento', 'Vencimento'], ['dataPagamento', 'Pagamento'], ['iofEncargos', 'IOF/Encargos'],
    ['idProposta', 'ID proposta'], ['codigoBarras', 'Código de barras'], ['anexoUrl', 'Anexo']
  ];

  const head = `<tr>${colunas.map(([campo, label]) => `<th onclick="toggleOrdenacao('${campo}')">${label} ${setaOrdenacao(campo)}</th>`).join('')}<th style="width:90px"></th></tr>`;

  const body = lista.map(r => {
    const atrasado = r.dataPagamento && r.dataVencimento && r.dataPagamento > r.dataVencimento;
    return `
    <tr>
      <td style="font-weight:600">${escapeHtml(r.nomeCliente)}</td>
      <td class="mono">${formatarCPF(r.cpf)}</td>
      <td class="mono" style="font-weight:600">${formatarMoeda(r.valorQuitacao)}</td>
      <td><span class="badge ${r.origemPagamento === 'fatura' ? 'badge-fatura' : 'badge-dda'}">${r.origemPagamento === 'fatura' ? 'FATURA' : 'DDA'}</span></td>
      <td class="mono">${r.valorBoleto ? formatarMoeda(r.valorBoleto) : '<span style="color:#8a9aad">—</span>'}</td>
      <td class="mono" style="text-align:center;">${r.qtdBoletosPagos || '<span style="color:#8a9aad">—</span>'}</td>
      <td>${r.seguroPremiadoPago ? `<span class="mono" style="color:#5fb88a">${formatarMoeda(r.valorSeguroPremiado)}</span>` : '<span style="color:#8a9aad">Não pago</span>'}</td>
      <td class="mono">${formatarData(r.dataVencimento)}</td>
      <td class="mono">${r.dataPagamento ? `<span style="color:#5fb88a">${formatarData(r.dataPagamento)}</span>` : '<span class="badge badge-pendente">PENDENTE</span>'}</td>
      <td class="mono">${r.iofEncargos ? `<span style="color:#a16207; font-weight:600">${formatarMoeda(r.iofEncargos)}</span>` : (atrasado ? '<span class="badge" style="background:#fdeaea; color:#c0504d;">FALTA INFORMAR</span>' : '<span style="color:#8a9aad">—</span>')}</td>
      <td class="mono">${escapeHtml(r.idProposta)}</td>
      <td class="mono" style="font-size:12px; max-width:180px;" title="${escapeHtml(r.codigoBarras)}">
        ${r.codigoBarras ? `<span style="display:inline-block; max-width:160px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; vertical-align:middle;">${escapeHtml(r.codigoBarras)}</span>` : '<span style="color:#8a9aad">—</span>'}
      </td>
      <td>${r.anexoUrl ? `<a href="${r.anexoUrl}" target="_blank" style="color:#1d6fc4; font-size:12px;">📎 Ver</a>` : '<span style="color:#8a9aad">—</span>'}</td>
      <td style="text-align:right; white-space:nowrap;">
        <button class="icon-btn edit" onclick="abrirEdicao('${r.id}')" title="Editar">✎</button>
        <button class="icon-btn del" onclick="pedirExclusao('${r.id}')" title="Excluir">🗑</button>
      </td>
    </tr>
  `;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `<table style="min-width:1500px"><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function renderTabelaClientes(lista) {
  const mapa = {};
  lista.forEach(r => {
    const chave = r.cpf || r.nomeCliente;
    if (!mapa[chave]) {
      mapa[chave] = { cpf: r.cpf, nomeCliente: r.nomeCliente, registros: [], totalQuitacao: 0, totalSeguro: 0, pagos: 0, pendentes: 0 };
    }
    mapa[chave].registros.push(r);
    mapa[chave].totalQuitacao += parseFloat(r.valorQuitacao) || 0;
    if (r.seguroPremiadoPago) mapa[chave].totalSeguro += parseFloat(r.valorSeguroPremiado) || 0;
    if (r.dataPagamento) mapa[chave].pagos++; else mapa[chave].pendentes++;
  });
  const clientes = Object.values(mapa).sort((a, b) => a.nomeCliente.localeCompare(b.nomeCliente));

  if (clientes.length === 0) {
    document.getElementById('tableWrap').innerHTML = `<div class="empty-state">Nenhum cliente encontrado com os filtros atuais.</div>`;
    return;
  }

  const head = `<tr><th>Cliente</th><th>CPF</th><th>Registros</th><th>Total quitação</th><th>Total seguro premiado</th><th>Status</th></tr>`;

  const body = clientes.map(c => {
    const chave = c.cpf || c.nomeCliente;
    const aberto = clienteExpandido === chave;
    const linhaCliente = `
      <tr style="cursor:pointer" onclick="toggleCliente('${chave.replace(/'/g, "\\'")}')">
        <td style="font-weight:600"><span class="expand-toggle">${aberto ? '▾' : '▸'}</span> ${escapeHtml(c.nomeCliente)}</td>
        <td class="mono">${formatarCPF(c.cpf)}</td>
        <td class="mono">${c.registros.length}</td>
        <td class="mono" style="font-weight:600">${formatarMoeda(c.totalQuitacao)}</td>
        <td class="mono" style="${c.totalSeguro > 0 ? 'color:#5fb88a' : 'color:#8a9aad'}">${formatarMoeda(c.totalSeguro)}</td>
        <td><span class="badge ${c.pendentes > 0 ? 'badge-status-warn' : 'badge-status-ok'}">${c.pagos} pago${c.pagos !== 1 ? 's' : ''} · ${c.pendentes} pendente${c.pendentes !== 1 ? 's' : ''}</span></td>
      </tr>`;
    const linhasDetalhe = aberto ? c.registros.map(r => `
      <tr class="expand-row">
        <td colspan="6">
          <span class="mono">${escapeHtml(r.idProposta)}</span> · ${formatarMoeda(r.valorQuitacao)} · venc. ${formatarData(r.dataVencimento)} · ${r.dataPagamento ? `<span style="color:#5fb88a">pago em ${formatarData(r.dataPagamento)}</span>` : '<span style="color:#a16207">pendente</span>'} ·
          <button class="link-btn" onclick="event.stopPropagation(); abrirEdicao('${r.id}')">editar</button>
        </td>
      </tr>
    `).join('') : '';
    return linhaCliente + linhasDetalhe;
  }).join('');

  document.getElementById('tableWrap').innerHTML = `<table style="min-width:700px"><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function toggleCliente(chave) {
  clienteExpandido = clienteExpandido === chave ? null : chave;
  render();
}

function render() {
  const lista = getFiltrados();
  renderCards(lista);
  if (visao === 'clientes') {
    renderTabelaClientes(lista);
  } else {
    renderTabelaRegistros(lista);
  }
}

// ---------- Init ----------
async function init() {
  document.getElementById('tableWrap').innerHTML = '<div class="empty-state">Carregando dados da nuvem...</div>';
  await carregarRegistros();
  render();
}
if (verificarSessao()) {
  init();
}
</script>
